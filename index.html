<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Aulac Fleet Schedule - fit vessel column (short status)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --accent: #f2b705;
      --muted: #6b6b6b;
      --bg: #f7f9fb;
      --table-bg: #fff;
      --header-bg: linear-gradient(90deg, #eef6fb 0%, #ffffff 60%);
      --row-height: 32px;
    }

    /* Arial and page layout */
    html,
    body {
      font-family: Arial, Helvetica, sans-serif;
      height: 100%;
      width: 100%;
      margin: 0;
      background: var(--bg);
      color: #222;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* SINGLE compact header across top (reduced padding) */
    header.global-header {
      display: flex;
      flex-shrink: 0;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      background: var(--header-bg);
      box-shadow: 0 6px 18px rgba(18, 38, 63, 0.06);
      gap: 12px;
    }

    .brand-left {
      font-weight: 800;
      color: #1e4f7a;
      font-size: 1.18rem;
      letter-spacing: 0.02em;
    }

    .brand-sub {
      display: block;
      color: #2b6cb0;
      font-size: 1rem;
      font-weight: 700;
      margin-top: 2px;
    }

    .center-counts {
      font-weight: 700;
      color: #234d6f;
      padding: 4px 8px;
      border-left: 4px solid var(--accent);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.95);
      font-size: 0.9rem;
    }

    .logo-img {
      height: 72px;
      width: auto;
      border-radius: 4px;
      background: white;
      padding: 3px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      object-fit: contain;
    }

    .logo-controls {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* two A5 pages side-by-side filling screen */
    .viewport {
      display: flex;
      flex-direction: row;
      flex: 1 1 auto;
      min-height: 0;
      width: 100vw;
      gap: 0;
      box-sizing: border-box;
    }

    .a5 {
      flex: 1 1 50%;
      display: flex;
      align-items: stretch;
      justify-content: center;
      box-sizing: border-box;
      padding: 0;
    }

    .card {
      width: 100%;
      height: 100%;
      margin: 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      background: var(--table-bg);
      padding: 10px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 6px;
    }

    .title {
      font-size: 1.02rem;
      color: #233247;
      font-weight: 700;
    }

    /* controls row */
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
    }

    .controls button {
      background: var(--accent);
      border: 0;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 700;
      color: #111;
      font-size: 0.86rem;
    }

    /* placeholder on right to match left controls height */
    .controls-placeholder {
      min-height: 30px;
    }

    /* panel and tables */
    .panel {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 0.90rem;
      height: 100%;
    }

    colgroup col.c1 {
      width: auto
    }

    /* JS will set explicit widths */
    colgroup col.c2 {
      width: 12%
    }

    colgroup col.c3 {
      width: 14%
    }

    colgroup col.c4 {
      width: 14%
    }

    colgroup col.c5 {
      width: 14%
    }

    colgroup col.c6 {
      width: 14%
    }

    thead th {
      background: linear-gradient(#fbfdff, #eef6fb);
      border-bottom: 4px solid var(--accent);
      text-align: left;
      padding: 8px;
      font-size: 0.88rem;
      color: #111;
      white-space: nowrap;
    }

    tbody {
      display: table-row-group
    }

    tbody tr {
      height: var(--row-height)
    }

    tbody td {
      padding: 6px 8px;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    tbody tr:nth-child(odd) {
      background: #fbfbfd
    }

    .vessel-name {
      font-weight: 700;
      color: #111
    }

    .vessel-code {
      color: var(--muted);
      font-size: 0.82rem;
      margin-left: 6px
    }

    .muted {
      color: var(--muted);
      font-size: 0.86rem
    }

    /* Short status word styling */
    .status-word {
      font-weight: 700
    }

    .status-performing {
      color: #1f78b4
    }

    /* blue */
    .status-fixed {
      color: #d73a49
    }

    /* red */
    .status-working {
      color: #f39c12
    }

    /* orange */

    .bottomTimestamp {
      margin-top: 6px;
      font-size: 0.86rem;
      color: #233247;
      background: rgba(255, 255, 255, 0.9);
      padding: 6px 8px;
      border-radius: 6px;
      border-left: 4px solid var(--accent);
      align-self: flex-end
    }

    /* print rules */
    @page {
      size: A5;
      margin: 10mm
    }

    @media print {
      body {
        background: #fff
      }

      header.global-header {
        display: block
      }

      .viewport {
        flex-direction: column
      }

      .a5 {
        width: 148mm;
        height: 210mm;
        page-break-after: always
      }

      .a5:last-child {
        page-break-after: auto
      }

      tbody tr {
        height: auto
      }

      .bottomTimestamp {
        position: fixed;
        right: 10mm;
        bottom: 10mm
      }
    }

    /* responsive small screens */
    @media (max-width:980px) {
      .viewport {
        overflow: auto
      }

      .logo-img {
        height: 60px
      }

      .center-counts {
        font-size: 0.85rem
      }
    }
  </style>
</head>

<body>
  <header class="global-header" role="banner">
    <div>
      <div class="brand-left">AULAC CORPORATION</div>
      <div class="brand-sub">Energy on the move</div>
    </div>

    <div style="text-align:center;">
      <div style="font-size:1.02rem;font-weight:700;color:#233247;">Fleet Schedule</div>
      <div id="globalCenterCounts" class="center-counts">Fixed: 0 voy(s) | Working: 0 voy(s)</div>
    </div>

    <div class="logo-controls">
      <img id="globalLogo" class="logo-img" alt="AULAC logo" src="" />
    </div>
  </header>

  <div class="viewport" id="viewport">
    <div class="a5" id="a5-left">
      <div class="card">
        <div id="leftControls" class="controls">
          <div style="font-size:0.82rem;color:var(--muted);font-weight:700;">&nbsp;</div>
        </div>

        <div class="panel">
          <div style="flex:1 1 auto;display:flex;flex-direction:column;gap:6px;overflow:hidden;">
            <table id="fleetTable1" role="table" aria-live="polite">
              <colgroup>
                <col class="c1" />
                <col class="c2" />
                <col class="c3" />
                <col class="c4" />
                <col class="c5" />
                <col class="c6" />
              </colgroup>
              <thead>
                <tr>
                  <th>Vessel name</th>
                  <th>Voy.No</th>
                  <th>Laycan</th>
                  <th>Departure</th>
                  <th>Arrival</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="bottomTimestamp" id="bottomTimestamp1">Not loaded</div>

      </div>
    </div>

    <div class="a5" id="a5-right">
      <div class="card">
        <!-- placeholder controls whose height will be synchronized with left controls -->
        <div id="rightControls" class="controls controls-placeholder" aria-hidden="true"></div>

        <div class="panel">
          <div style="flex:1 1 auto;display:flex;flex-direction:column;gap:6px;overflow:hidden;">
            <table id="fleetTable2" role="table" aria-live="polite">
              <colgroup>
                <col class="c1" />
                <col class="c2" />
                <col class="c3" />
                <col class="c4" />
                <col class="c5" />
                <col class="c6" />
              </colgroup>
              <thead>
                <tr>
                  <th>Vessel name</th>
                  <th>Voy.No</th>
                  <th>Laycan</th>
                  <th>Departure</th>
                  <th>Arrival</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="bottomTimestamp" id="bottomTimestamp2">Not loaded</div>

      </div>
    </div>
  </div>

    const VESSEL_MAP = {
      "ADM": "Aulac Diamond", "ACF": "Aulac Conifer", "AVS": "Aulac Vision", "ABL": "Aulac Bella",
      "AEG": "Aulac Eagle", "AAR": "Aulac Aurora", "ASR": "Aulac Sirius", "AMS": "Aulac Mission"

    const bottomTimestamp1 = document.getElementById('bottomTimestamp1');
    const bottomTimestamp2 = document.getElementById('bottomTimestamp2');
    const globalCenterCounts = document.getElementById('globalCenterCounts');
    const globalLogo = document.getElementById('globalLogo');
    const leftControls = document.getElementById('leftControls');
    const rightControls = document.getElementById('rightControls');
    let csvModifiedText = '';

    let lastHash = null;

    // load saved logo if present
    (function loadLogo() {
      const data = localStorage.getItem('aulac_logo_compact');
      if (data) { globalLogo.src = data; globalLogo.style.height = '92px'; }
      else {
        globalLogo.src = EMBEDDED_LOGO;
        globalLogo.style.height = '72px';
      }
    })();

    // CSV parser helpers unchanged
    function parseCsvLine(line) {
      const cols = []; let cur = '', inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQuotes = !inQuotes; continue; }
        if (ch === ',' && !inQuotes) { cols.push(cur); cur = ''; continue; }
        cur += ch;
      }
      cols.push(cur);
      return cols.map(c => c.trim());
    }
    function splitHeaderAndBodySmart(text) {
      const lines = text.split(/\r\n|\n|\r/);
      let header = [], startIdx = 0;
      for (let i = 0; i < lines.length; i++) {
        const l = lines[i].trim();
        if (l === '') { header.push(lines[i]); continue; }
        const cols = parseCsvLine(lines[i]);
        if ((cols[1] && /^[A-Z]{2,5}-\d{2,4}$/i.test(cols[1])) || (cols[0] && /^[A-Z]{2,5}-\d{2,4}$/i.test(cols[0]))) {
          startIdx = i; break;
        }
        if (cols[0] && /^[A-Z]{2,5}$/i.test(cols[0]) && cols[1] && /^[A-Z]{2,5}-\d{2,4}$/i.test(cols[1])) {
          startIdx = i; break;
        }
        header.push(lines[i]);
      }
      return { headerLines: header, bodyLines: lines.slice(startIdx) };
    }
    function extractCounts(headerLines) {
      const txt = headerLines.join(' ');
      const r = { fixed: 0, working: 0 };
      const f = txt.match(/Fixed[:\s-]*\D*?(\d{1,4})/i) || txt.match(/- Fixed[:\s]*[^0-9]*?(\d{1,4})/i);
      const w = txt.match(/Working[:\s-]*\D*?(\d{1,4})/i) || txt.match(/- Working[:\s]*[^0-9]*?(\d{1,4})/i);
      if (f) r.fixed = parseInt(f[1], 10);
      if (w) r.working = parseInt(w[1], 10);
      return r;
    }
    function buildVoyageObject(code, cols) {
      const voyNo = cols[1] || "";
      const laycan = cols[2] || "";
      const port1 = cols[3] || "";
      const port2 = cols[4] || "";
      const last = cols.slice(5).filter(Boolean).join(" ");
      return { code, voyNo, laycan, departure: port1, arrival: port2, details: last ? [last] : [] };
    }
    function renderStatus(details) {
      if (!details || !details.length) return "";
      return details.map(d => d.replace(/\s+/g, ' ').trim()).join(' | ');
    }

    function loadScheduleFromCsv() {
      fetch("https://docs.google.com/spreadsheets/d/1OqfwY8Vv_O5QSw-EKu6wgGeDaYRF94uF/export?format=csv&gid=0")
        .then(function(resp) {
          if (!resp.ok) throw new Error('CSV not found (' + resp.status + ')');
          var lastMod = resp.headers.get('Last-Modified');
          csvModifiedText = lastMod ? new Date(lastMod).toLocaleString() : new Date().toLocaleString();
          return resp.text();
        })
        .then(function(text) {
          const voyages = parseCsvToVoyages(text);
          renderAllGrouped(voyages);
          bottomTimestamp1.textContent = bottomTimestamp2.textContent = 'Loaded: ' + csvModifiedText;
        })
        .catch(function(err) {
          bottomTimestamp1.textContent = bottomTimestamp2.textContent = 'Error: ' + err.message;
        });
    }
    function parseCsvToVoyages(text) {
      const { headerLines, bodyLines } = splitHeaderAndBodySmart(text);
      const counts = extractCounts(headerLines);
      globalCenterCounts.textContent = `Fixed: ${counts.fixed} voy(s)  |  Working: ${counts.working} voy(s)`;

      let current = null, voyages = [];
      for (const raw of bodyLines) {
        if (!raw || raw.trim() === '') continue;
        const cols = parseCsvLine(raw);
        if (cols[0] && /^[A-Z]{2,5}$/i.test(cols[0])) {
          current = { code: cols[0].trim() };
          if (cols[1] && cols[1].trim() !== '') voyages.push(buildVoyageObject(current.code, cols));
          continue;
        }
        if (!cols[0] && cols[1] && cols[1].trim() !== '') {
          if (!current) continue;
          voyages.push(buildVoyageObject(current.code, cols));
          continue;
        }
        if (cols[0] && /^[A-Z]{2,5}-\d{2,4}$/i.test(cols[0])) {
          if (current) voyages.push(buildVoyageObject(current.code, cols));
          else voyages.push(buildVoyageObject('UNKNOWN', cols));
          continue;
        }
        if (voyages.length > 0) {
          const last = voyages[voyages.length - 1];
          const detail = cols.join(' ').trim();
          if (detail) { if (!last.details) last.details = []; last.details.push(detail); }
        }
      }

      voyages = voyages.map(v => ({
        ...v,
        vesselFull: VESSEL_MAP[v.code] || v.code,
        statusText: renderStatus(v.details || [])
      }));
      return voyages;
    }

    /* Determine short status token from full status text */
    function extractShortStatus(full) {
      if (!full) return '';
      const u = full.toUpperCase();
      if (u.includes('PERFORMING')) return 'PERFORMING';
      if (u.includes('FIXED')) return 'FIXED';
      if (u.includes('WORKING')) return 'WORKING';
      return '';
    }

    /* compute vessel column width (unchanged function from prior) */
    function setVesselColumnWidthCapAndApply() {
      const tables = [document.getElementById('fleetTable1'), document.getElementById('fleetTable2')];
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const tableStyle = window.getComputedStyle(document.querySelector('table'));
      const fontSize = tableStyle.fontSize || '14px';
      const fontFamily = tableStyle.fontFamily || 'Arial, Helvetica, sans-serif';
      ctx.font = `${fontSize} ${fontFamily}`;

      let maxTextWidth = 0;
      tables.forEach(tbl => {
        const headerText = (tbl.querySelector('thead th') || {}).textContent || '';
        const hw = ctx.measureText(headerText.trim()).width;
        if (hw > maxTextWidth) maxTextWidth = hw;
        const rows = tbl.querySelectorAll('tbody tr');
        rows.forEach(tr => {
          const td = tr.querySelector('td');
          if (!td) return;
          const text = (td.textContent || '').trim();
          if (!text) return;
          const w = ctx.measureText(text).width;
          if (w > maxTextWidth) maxTextWidth = w;
        });
      });

      if (maxTextWidth <= 0) { maxTextWidth = 120; }
      const paddingAllowance = 40;
      let vesselColPx = Math.ceil(maxTextWidth + paddingAllowance);
      const card = document.getElementById('a5-left').querySelector('.card');
      const cardWidth = card ? card.getBoundingClientRect().width : window.innerWidth / 2;
      const maxPercent = 0.42;
      const capPx = Math.floor(cardWidth * maxPercent);
      if (vesselColPx > capPx) vesselColPx = capPx;
      const remainingPx = Math.max(0, cardWidth - vesselColPx);
      const col2to6PercentEach = (remainingPx / cardWidth) * 100 / 5;

      ['fleetTable1', 'fleetTable2'].forEach(id => {
        const table = document.getElementById(id);
        if (!table) return;
        const cols = table.querySelectorAll('colgroup col');
        if (cols && cols.length >= 6) {
          cols[0].style.width = vesselColPx + 'px';
          for (let i = 1; i < 6; i++) {
            cols[i].style.width = col2to6PercentEach + '%';
          }
          table.style.tableLayout = 'fixed';
        }
      });
    }

    // render grouped rows but show only short status tokens
    function renderAllGrouped(voyages) {
      const rows = [];
      let prevCode = null;
      for (const v of voyages) {
        const showName = (v.code !== prevCode);
        const vesselCell = showName ? v.code : '';
        rows.push({
          vesselCell,
          voyNo: v.voyNo,
          laycan: v.laycan,
          departure: v.departure,
          arrival: v.arrival,
          statusText: v.statusText
        });
        prevCode = v.code;
      }

      const total = rows.length;
      const leftCount = Math.ceil(total / 2);
      const leftRows = rows.slice(0, leftCount);
      const rightRows = rows.slice(leftCount);

      renderRows('fleetTable1', leftRows);
      renderRows('fleetTable2', rightRows);

      const now = new Date().toLocaleString();
      bottomTimestamp1.textContent = bottomTimestamp2.textContent = `Updated: ${now}`;
      requestAnimationFrame(function() {
        setVesselColumnWidthCapAndApply();
        syncControlsHeight(); adjustRowHeight();
      });
    }

    function renderRows(tableId, rows) {
      const tbody = document.querySelector('#' + tableId + ' tbody');
      tbody.innerHTML = '';
      const target = Math.max(8, rows.length);
      for (let i = 0; i < target; i++) {
        const r = rows[i] || null;
        const tr = document.createElement('tr');
        if (r) {
          // compute short status token
          const shortStatus = extractShortStatus(r.statusText);
          let statusHtml = '';
          if (shortStatus === 'PERFORMING') statusHtml = `<span class="status-word status-performing">${shortStatus}</span>`;
          else if (shortStatus === 'FIXED') statusHtml = `<span class="status-word status-fixed">${shortStatus}</span>`;
          else if (shortStatus === 'WORKING') statusHtml = `<span class="status-word status-working">${shortStatus}</span>`;
          else statusHtml = ''; // show nothing if none of the three

          tr.innerHTML = `
        <td title="${r.vesselCell}"><span class="vessel-name">${escapeHtml(r.vesselCell)}</span></td>
        <td class="muted" title="${escapeHtml(r.voyNo)}">${escapeHtml(r.voyNo)}</td>
        <td class="muted" title="${escapeHtml(r.laycan)}">${escapeHtml(r.laycan)}</td>
        <td class="muted" title="${escapeHtml(r.departure)}">${escapeHtml(r.departure)}</td>
        <td class="muted" title="${escapeHtml(r.arrival)}">${escapeHtml(r.arrival)}</td>
        <td class="status" title="${escapeHtml(r.statusText)}">${statusHtml}</td>
      `;
        } else {
          tr.innerHTML = '<td></td><td></td><td></td><td></td><td></td><td></td>';
        }
        tbody.appendChild(tr);
      }
    }

    function escapeHtml(s) { return s ? s.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])) : ''; }

    // sync controls height to keep tables parallel
    function syncControlsHeight() {
      try {
        const h = leftControls.getBoundingClientRect().height;
        rightControls.style.height = h + 'px';
        rightControls.style.minHeight = h + 'px';
      } catch (e) { }
      setTimeout(adjustRowHeight, 60);
    }

    // adjust row height to fit available space
    function adjustRowHeight() {
      const leftCard = document.getElementById('a5-left').querySelector('.card');
      if (!leftCard) return;
      const thead = leftCard.querySelector('thead');
      const titleRow = leftCard.querySelector('.title-row');
      const controls = leftCard.querySelector('.controls');
      const bottomTs = leftCard.querySelector('.bottomTimestamp');

      const used = (titleRow ? titleRow.getBoundingClientRect().height : 0)
        + (controls ? controls.getBoundingClientRect().height : 0)
        + (thead ? thead.getBoundingClientRect().height : 0)
        + (bottomTs ? bottomTs.getBoundingClientRect().height : 0)
        + 28;
      const cardRect = leftCard.getBoundingClientRect();
      const available = Math.max(0, cardRect.height - used);
      const leftRows = Math.max(8, document.querySelectorAll('#fleetTable1 tbody tr').length || 8);
      const rh = Math.max(16, Math.floor(available / leftRows));
      document.documentElement.style.setProperty('--row-height', rh + 'px');
      if (thead) {
        const h = thead.getBoundingClientRect().height + leftRows * rh;
        const t1 = document.getElementById('fleetTable1');
        const t2 = document.getElementById('fleetTable2');
        if (t1) t1.style.height = h + 'px';
        if (t2) t2.style.height = h + 'px';
      }
    }

    /* small string hash for change detection */
    function simpleHash(s) { let h = 0; for (let i = 0; i < s.length; i++) h = ((h << 5) - h) + s.charCodeAt(i) | 0; return String(h); }

    /* sync controls and initialize */
    window.addEventListener('resize', () => { if (window._syncTimer) clearTimeout(window._syncTimer); window._syncTimer = setTimeout(() => { syncControlsHeight(); setVesselColumnWidthCapAndApply(); }, 160); });
    function syncControlsHeight() { try { const h = leftControls.getBoundingClientRect().height; rightControls.style.height = h + 'px'; rightControls.style.minHeight = h + 'px'; } catch (e) { } setTimeout(adjustRowHeight, 60); }
    window.addEventListener('load', () => { syncControlsHeight(); setTimeout(syncControlsHeight, 200); loadScheduleFromCsv(); });

    /* initial text */
    bottomTimestamp1.textContent = bottomTimestamp2.textContent = 'Ready';
  </script>
</body>
